<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algoman - Binance Live Trading Dashboard</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #1e1e2e;
            --secondary-color: #2d2d44;
            --accent-color: #00d4ff;
            --success-color: #00ff41;
            --danger-color: #ff0055;
            --text-color: #e0e0e0;
            --border-color: #3d3d5c;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--primary-color) 0%, #0f0f1e 100%);
            color: var(--text-color);
            overflow-x: hidden;
        }

        .header {
            background: var(--primary-color);
            border-bottom: 2px solid var(--accent-color);
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 12px rgba(0, 212, 255, 0.2);
        }

        .header h1 {
            font-size: 1.8rem;
            color: var(--accent-color);
            font-weight: 700;
            letter-spacing: 2px;
        }

        .header-controls {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: var(--secondary-color);
            border-radius: 20px;
            font-size: 0.9rem;
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success-color);
            animation: pulse 2s infinite;
        }

        .status-indicator.offline {
            background: var(--danger-color);
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .controls {
            background: var(--secondary-color);
            padding: 1.5rem;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            margin-bottom: 2rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .control-group {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .control-group label {
            font-weight: 600;
            color: var(--accent-color);
            min-width: 100px;
        }

        select, input {
            background: var(--primary-color);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 0.7rem 1rem;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        select:hover, input:hover {
            border-color: var(--accent-color);
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
        }

        button {
            background: linear-gradient(135deg, var(--accent-color), #0099cc);
            color: var(--primary-color);
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 5px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 212, 255, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .card {
            background: var(--secondary-color);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 1.5rem;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: var(--accent-color);
            box-shadow: 0 12px 36px rgba(0, 212, 255, 0.2);
            transform: translateY(-4px);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--accent-color);
        }

        .card-subtitle {
            font-size: 0.85rem;
            color: #999;
        }

        .price-display {
            font-size: 2rem;
            font-weight: 700;
            margin: 1rem 0;
            font-family: 'Courier New', monospace;
        }

        .price-change {
            font-size: 1.2rem;
            font-weight: 600;
            margin-top: 0.5rem;
        }

        .price-change.positive {
            color: var(--success-color);
        }

        .price-change.negative {
            color: var(--danger-color);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-top: 1rem;
        }

        .stat {
            background: var(--primary-color);
            padding: 1rem;
            border-radius: 5px;
            border-left: 3px solid var(--accent-color);
        }

        .stat-label {
            font-size: 0.85rem;
            color: #999;
            margin-bottom: 0.3rem;
        }

        .stat-value {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--text-color);
            font-family: 'Courier New', monospace;
        }

        .chart-container {
            position: relative;
            height: 300px;
            margin-top: 1rem;
        }

        .order-book {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 1rem;
        }

        .order-book-side {
            background: var(--primary-color);
            padding: 1rem;
            border-radius: 5px;
            max-height: 250px;
            overflow-y: auto;
        }

        .order-book-title {
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .order-book-title.bids {
            color: var(--success-color);
        }

        .order-book-title.asks {
            color: var(--danger-color);
        }

        .order-entry {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
            padding: 0.5rem 0;
            font-size: 0.85rem;
            font-family: 'Courier New', monospace;
            border-bottom: 1px solid var(--border-color);
        }

        .order-price {
            text-align: right;
        }

        .order-qty {
            text-align: right;
            color: #999;
        }

        .alerts {
            background: var(--secondary-color);
            border-left: 4px solid var(--accent-color);
            padding: 1rem;
            border-radius: 5px;
            margin-bottom: 2rem;
            display: none;
        }

        .alerts.show {
            display: block;
        }

        .alert {
            padding: 0.5rem 0;
            font-size: 0.9rem;
        }

        .footer {
            text-align: center;
            padding: 2rem;
            color: #666;
            border-top: 1px solid var(--border-color);
            margin-top: 3rem;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: #999;
        }

        .spinner {
            border: 3px solid var(--border-color);
            border-top: 3px solid var(--accent-color);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 1rem auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .no-data {
            text-align: center;
            padding: 2rem;
            color: #999;
            font-style: italic;
        }

        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr;
            }

            .header {
                flex-direction: column;
                gap: 1rem;
            }

            .controls {
                flex-direction: column;
                align-items: flex-start;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📊 ALGOMAN</h1>
        <div class="header-controls">
            <div class="status">
                <div class="status-indicator" id="status-indicator"></div>
                <span id="status-text">Connecting...</span>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="controls">
            <div class="control-group">
                <label for="symbol-select">Symbol:</label>
                <select id="symbol-select">
                    <option value="BTCUSDT">Bitcoin (BTCUSDT)</option>
                    <option value="ETHUSDT">Ethereum (ETHUSDT)</option>
                    <option value="BNBUSDT">Binance Coin (BNBUSDT)</option>
                </select>
            </div>
            <div class="control-group">
                <button onclick="addSymbolCard()">+ Add Symbol</button>
                <button onclick="refreshData()">🔄 Refresh</button>
            </div>
        </div>

        <div id="alerts" class="alerts"></div>

        <div class="dashboard" id="dashboard">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading market data...</p>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>Algoman © 2024 | Real-time Binance Data | Updated in real-time via WebSocket</p>
    </div>

    <script src="app.js"></script>
</body>
</html>
